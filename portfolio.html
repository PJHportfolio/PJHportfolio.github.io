          <br>복합적인 마스크와 매트 기법을 활용한 정교한 연출을 기획했습니다.` },
          {
            step: '02. 제작', description: `직접 촬영한 원본 소스의 질감을 최대한 살리면서도, 영상 전체에 포근한 무드가 감돌도록 따뜻한 웜톤 색보정을 진행했습니다. 
          <br>특히 향기의 속성을 시각화하기 위해 '그림자', '새벽', '은은함'과 같은 키워드를 트랙 매트를 활용하여, 감각적인 연출을 시도했습니다` },
          {
            step: '03. 완성', description: `영상의 분위기를 해치지 않는 범위 내에서 텍스트를 배치했습니다. 
          <br>직접 촬영한 각 장면의 전환과 매트 기법을 활용한 전환 효과가 배경음악과 자연스럽게 어우러지도록 최종 편집을 조율하여 완성도를 높였습니다.` }
        ],
        images: [
          'img/디퓨져/01.png',
          'img/디퓨져/02.png',
          'img/디퓨져/03.png',
          'img/디퓨져/04.png',
          'img/디퓨져/05.png',
          'img/디퓨져/06.png',
          
        ]
      }
    };

    function openModal(id) {
      const data = portfolioData[id];
      const paddingBottom = data.videoRatio === '9:16' ? '177.78%' : '56.25%';

      let html = `
        <p class="modal-category">Category : ${data.category}</p>
        <h2 class="modal-title">${data.title}</h2>

        <div class="modal-video" data-ratio="${data.videoRatio}">
          ${data.youtubeUrl}
        </div>

        <div class="modal-section">
          <h3>프로젝트 개요</h3>
          <div class="modal-overview">
            <div class="modal-overview-item">
              <p>작업기간</p>
              <p>${data.duration}</p>
            </div>
            <div class="modal-overview-item">
              <p>사용 툴</p>
              <p>${data.tools}</p>
            </div>
            <div class="modal-overview-item">
              <p>제작 방식</p>
              <p>${data.method}</p>
            </div>
          </div>
        </div>

        <div class="modal-section">
          <h3>디자인 컨셉</h3>
          <p class="modal-concept">${data.concept}</p>
        </div>

        <div class="modal-section">
          <h3 style="color: #111111; font-weight: 700;">작업 프로세스</h3>
          <div class="modal-process">
            ${data.process.map(proc => `
              <div class="modal-process-item" style="margin-bottom: 2rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 1.5rem;">
                <p class="modal-process-step" style="font-weight: bold; color: #0f766e; margin-bottom: 0.4rem; font-size: 1.05rem;">${proc.step}</p>
                
                ${proc.title ? `<p class="modal-process-title" style="font-weight: 700; color: #111111; margin-bottom: 0.5rem; font-size: 1.1rem;">${proc.title}</p>` : ''}
                
                <p class="modal-process-description" style="color: #2c3e50; line-height: 1.6; font-size: 0.95rem; font-weight: 400; margin-top: 0;">${proc.description}</p>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="modal-section">
          <h3>프리뷰</h3>
          <div class="modal-preview">
            ${data.images.map(img => `<img src="${img}" alt="프리뷰">`).join('')}
          </div>
        </div>
      `;

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal(event) {
      if (event && event.target.id !== 'modal') return;
      document.getElementById('modal').classList.remove('active');
    }

    function navigateTo(page) {
      window.location.href = page;
    }
  </script>
